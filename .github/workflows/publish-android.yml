name: Publish Android Artifacts
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  publish-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: List publish tasks
        run: ./gradlew :lib:maplibre-compose:tasks --all 2>&1 | grep -i 'publish.*GitHub\|GitHubPackages' || true
      - name: Publish maplibre-compose Android AAR
        run: ./gradlew :lib:maplibre-compose:publishAllPublicationsToGitHubPackagesRepository
        env:
          ORG_GRADLE_PROJECT_githubUser: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubToken: ${{ secrets.GITHUB_TOKEN }}
